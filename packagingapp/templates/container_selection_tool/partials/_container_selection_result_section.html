<div class="app-card">
    <div class="app-card-body">
        <div class="app-section-title">Result</div>
        <div class="app-section-subtitle">3D arrangement preview and quantity summary.</div>

        {% if result %}
            <div class="tool-stat-card mb-3">
                <div class="tool-stat-label">Max quantity</div>
                <div class="tool-stat-value">{{ result.max_quantity }}</div>
            </div>

            {% if image_url %}
                <div class="tool-render-wrap">
                    <img src="{{ image_url }}" alt="Packing result" class="tool-render-image">
                </div>
            {% endif %}
        {% else %}
            <div class="app-empty-state">
                <i class="bi bi-box2-heart fs-2 d-block mb-2"></i>
                <div>Run a single analysis or select one Top 5 candidate to generate the result.</div>
            </div>
        {% endif %}
    </div>
</div>
