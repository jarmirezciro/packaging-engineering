<script>
    if (typeof window.setAction !== "function") {
      window.setAction = function(value) {
        const actionInput = document.querySelector('input[name="action"]');
        if (actionInput) actionInput.value = value;
      };
    }

    if (typeof window.setHidden !== "function") {
      window.setHidden = function(name, value) {
        const field = document.querySelector(`[name="${name}"]`);
        if (field) field.value = value;
      };
    }

    function syncCheckboxHidden(checkbox) {
      const hidden = checkbox.parentElement.querySelector('input[type="hidden"]');
      if (hidden) hidden.value = checkbox.checked ? "1" : "0";
    }
    
    function addProductRow() {
      const tpl = document.getElementById("product-row-template");
      const tbody = document.getElementById("products-tbody");
      if (!tpl || !tbody) return;
      tbody.appendChild(tpl.content.cloneNode(true));
    
      const newRow = tbody.lastElementChild;
      if (newRow) {
        newRow.querySelectorAll('input[type="checkbox"]').forEach(cb => syncCheckboxHidden(cb));
      }
    }
    
    function removeProductRow(btn) {
      const tbody = document.getElementById("products-tbody");
      const rows = tbody ? tbody.querySelectorAll("tr") : [];
      if (rows.length <= 1) return;
      btn.closest("tr").remove();
    }
    
    function selectContainerFromCatalogue(containerId) {
      const el = document.querySelector('[name="container_id"]');
      if (el) el.value = String(containerId);
      const action = document.querySelector('input[name="action"]');
      if (action) action.value = 'refresh';
      document.getElementById("container-tool-form")?.submit();
    }
    
    function showPackagingCatalogueAgain() {
      const el = document.querySelector('[name="container_id"]');
      if (el) el.value = '';
      const action = document.querySelector('input[name="action"]');
      if (action) action.value = 'refresh';
      document.getElementById("container-tool-form")?.submit();
    }
    
    function onProductCatalogueChange() {
      const st = document.getElementById("scroll_target");
      if (st) st.value = 'product_catalogue';
      const action = document.querySelector('input[name="action"]');
      if (action) action.value = 'refresh';
      document.getElementById("container-tool-form")?.submit();
    }
    
    function selectProductFromCatalogue(productId) {
      const selectedRowField = document.getElementById("selected_row_index");
      if (!selectedRowField) return;
    
      const rowIndex = selectedRowField.value;
      if (rowIndex === null || rowIndex === undefined || rowIndex === "") return;
    
      const el = document.getElementById("product_id_to_fill");
      if (el) el.value = String(productId);
    
      const action = document.querySelector('input[name="action"]');
      if (action) action.value = 'select_product';
    
      document.getElementById("container-tool-form")?.submit();
    }
    
    function openProductCatalogueForRow(rowIndex) {
      const normalizedIndex = String(rowIndex);
    
      const rowField = document.getElementById("selected_row_index");
      if (rowField) rowField.value = normalizedIndex;
    
      const scrollField = document.getElementById("scroll_target");
      if (scrollField) scrollField.value = 'product_catalogue';
    
      const card = document.getElementById("productCatalogueCard");
      if (card) card.style.display = 'block';
    
      const label = document.getElementById("selectedRowLabel");
      if (label) label.textContent = String(Number(normalizedIndex) + 1);
    }
    
    function openProductCatalogueForRowFromButton(button) {
      const row = button.closest("tr");
      const rows = Array.from(document.querySelectorAll("#products-tbody tr"));
      const rowIndex = rows.indexOf(row);
    
      if (rowIndex < 0) return;
      openProductCatalogueForRow(rowIndex);
    }
    
    function hideProductCatalogueSection() {
      const rowField = document.getElementById("selected_row_index");
      if (rowField) rowField.value = '';
    
      const card = document.getElementById("productCatalogueCard");
      if (card) card.style.display = 'none';
    }
    
    function toggleSection(sectionId, button) {
      const el = document.getElementById(sectionId);
      if (!el) return;
    
      el.classList.toggle("section-collapsed");
    
      const icon = button.querySelector("i");
      if (icon) {
        icon.className = el.classList.contains("section-collapsed")
          ? "bi bi-chevron-down"
          : "bi bi-chevron-up";
      }
    
      if (sectionId === "containerSectionBody") {
        const summary = document.getElementById("containerCollapsedSummary");
        if (summary) {
          summary.style.display = el.classList.contains("section-collapsed") ? "block" : "none";
        }
      }
    }
    
    function updateContainerSourceUI() {
      const source = document.querySelector('input[name="container_source"]:checked')?.value || "manual";
      const manualFields = document.getElementById("manualContainerFields");
      const catalogueSummary = document.getElementById("catalogueContainerSummary");
      const catalogueCard = document.getElementById("catalogueSectionCard");
    
      if (source === "catalogue") {
        if (manualFields) manualFields.style.display = "none";
        if (catalogueSummary) catalogueSummary.style.display = "block";
    
        const hasSelectedContainer = !!document.querySelector('[name="container_id"]')?.value;
        if (catalogueCard) catalogueCard.style.display = hasSelectedContainer ? "none" : "block";
      } else {
        if (manualFields) manualFields.style.display = "block";
        if (catalogueSummary) catalogueSummary.style.display = "none";
        if (catalogueCard) catalogueCard.style.display = "none";
    
        const c = document.querySelector('[name="container_id"]');
        if (c) c.value = '';
      }
    }
    
    function onPackagingCatalogueChange() {
      const c = document.querySelector('[name="container_id"]');
      if (c) c.value = '';
    
      const action = document.querySelector('input[name="action"]');
      if (action) action.value = 'refresh';
    
      document.getElementById("container-tool-form")?.submit();
    }
    
    /* Workflow helpers */
    
    function fpTransportSyncCheckboxHidden(checkbox) {
      syncCheckboxHidden(checkbox);
    }
    
    function fpTransportAddProductRow(idx) {
      const tpl = document.getElementById('fpTransportProductRowTemplate_' + idx);
      const tbody = document.getElementById('fpTransportProductsTbody_' + idx);
      if (!tpl || !tbody) return;
    
      tbody.appendChild(tpl.content.cloneNode(true));
    
      const newRow = tbody.lastElementChild;
      if (newRow) {
        newRow.querySelectorAll('input[type="checkbox"]').forEach(cb => syncCheckboxHidden(cb));
      }
    }
    
    function fpTransportRemoveProductRow(btn, idx) {
      const tbody = document.getElementById('fpTransportProductsTbody_' + idx);
      const rows = tbody ? tbody.querySelectorAll('tr') : [];
      if (rows.length <= 1) return;
      btn.closest('tr').remove();
    }
    
    function fpTransportSelectContainerFromCatalogue(idx, containerId) {
      const el = document.getElementById('container_id_' + idx);
      if (el) el.value = String(containerId);
      fpSetAction(idx, 'select_container');
      fpForm(idx).submit();
    }
    
    function fpTransportShowPackagingCatalogue(idx) {
      const el = document.getElementById('container_id_' + idx);
      if (el) el.value = '';
      fpSetAction(idx, 'browse_packaging');
      fpForm(idx).submit();
    }
    
    function fpTransportPackagingCatalogueChanged(idx) {
      const el = document.getElementById('container_id_' + idx);
      if (el) el.value = '';
      fpSetAction(idx, 'refresh');
      fpForm(idx).submit();
    }
    
    function fpTransportProductCatalogueChanged(idx) {
      fpSetAction(idx, 'refresh');
      fpForm(idx).submit();
    }
    
    function fpTransportSelectProduct(idx, productId) {
      const rowField = document.getElementById('transport_selected_row_index_' + idx);
      if (!rowField) return;
    
      const rowIndex = rowField.value;
      if (rowIndex === null || rowIndex === undefined || rowIndex === "") return;
    
      const el = document.getElementById('transport_product_id_to_fill_' + idx);
      if (el) el.value = String(productId);
    
      fpSetAction(idx, 'select_product');
      fpForm(idx).submit();
    }
    
    function fpTransportOpenProductCatalogueForRow(idx, rowIndex) {
      const normalizedIndex = String(rowIndex);
    
      const field = document.getElementById('transport_selected_row_index_' + idx);
      if (field) field.value = normalizedIndex;
    
      const card = document.getElementById('fpTransportProductCatalogueCard_' + idx);
      if (card) card.style.display = 'block';
    
      const label = document.getElementById('fpTransportSelectedRowLabel_' + idx);
      if (label) label.textContent = String(Number(normalizedIndex) + 1);
    }
    
    function fpTransportOpenProductCatalogueForRowFromButton(button, idx) {
      const row = button.closest('tr');
      const rows = Array.from(document.querySelectorAll('#fpTransportProductsTbody_' + idx + ' tr'));
      const rowIndex = rows.indexOf(row);
    
      if (rowIndex < 0) return;
      fpTransportOpenProductCatalogueForRow(idx, rowIndex);
    }
    
    function fpTransportHideProductCatalogueSection(idx) {
      const field = document.getElementById('transport_selected_row_index_' + idx);
      if (field) field.value = '';
    
      const card = document.getElementById('fpTransportProductCatalogueCard_' + idx);
      if (card) card.style.display = 'none';
    }
    
    function fpTransportToggleSection(idx) {
      const section = document.getElementById('fpTransportContainerSectionBody_' + idx);
      const summary = document.getElementById('fpTransportContainerCollapsedSummary_' + idx);
      const icon = document.getElementById('fpTransportContainerIcon_' + idx);
      if (!section) return;
    
      const collapsed = section.classList.toggle('section-collapsed');
      if (summary) summary.style.display = collapsed ? 'block' : 'none';
      if (icon) icon.className = collapsed ? 'bi bi-chevron-down' : 'bi bi-chevron-up';
    }
    
    function fpTransportUpdateContainerSourceUI(idx) {
      const form = fpForm(idx);
      if (!form) return;
    
      const source = form.querySelector('input[name="container_source_' + idx + '"]:checked')?.value || 'manual';
      const manualFields = document.getElementById('fpTransportManualContainerFields_' + idx);
      const catalogueSummary = document.getElementById('fpTransportCatalogueContainerSummary_' + idx);
      const catalogueCard = document.getElementById('fpTransportCatalogueSectionCard_' + idx);
      const hasSelected = !!(document.getElementById('container_id_' + idx)?.value);
    
      if (source === 'catalogue') {
        if (manualFields) manualFields.style.display = 'none';
        if (catalogueSummary) catalogueSummary.style.display = 'block';
        if (catalogueCard) catalogueCard.style.display = hasSelected ? 'none' : 'block';
      } else {
        if (manualFields) manualFields.style.display = 'block';
        if (catalogueSummary) catalogueSummary.style.display = 'none';
        if (catalogueCard) catalogueCard.style.display = 'none';
      }
    }
    
    function fpTransportContainerSourceChanged(idx) {
      const field = document.getElementById('container_id_' + idx);
      if (field) field.value = '';
      fpSetAction(idx, 'refresh');
      fpForm(idx).submit();
    }

    function initStandaloneTransportUI(root) {
      if (!root) return;
      root.querySelectorAll('#products-tbody input[type="checkbox"]').forEach(cb => syncCheckboxHidden(cb));
      root.querySelectorAll('input[name="container_source"]').forEach(el => {
        el.addEventListener('change', updateContainerSourceUI);
      });
      const packagingCatalogueSelect = root.querySelector('#id_catalogue_id');
      if (packagingCatalogueSelect) {
        packagingCatalogueSelect.addEventListener('change', onPackagingCatalogueChange);
      }
      updateContainerSourceUI();

      const scrollTargetField = root.querySelector('#scroll_target');
      const scrollTarget = scrollTargetField ? scrollTargetField.value : '';
      if (scrollTarget === 'product_catalogue') {
        const productCatalogueCard = root.querySelector('#productCatalogueCard');
        if (productCatalogueCard && productCatalogueCard.style.display !== 'none') {
          setTimeout(function () {
            productCatalogueCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }, 120);
        }
      }

      const autoHideField = root.querySelector('[data-transport-auto-hide-product-catalogue]');
      const autoHideProductCatalogue = !!(autoHideField && autoHideField.value === '1');
      if (autoHideProductCatalogue) {
        const productCatalogueCard = root.querySelector('#productCatalogueCard');
        if (productCatalogueCard) productCatalogueCard.style.display = 'none';
        const productsSection = root.querySelector('#productsSectionCard');
        if (productsSection) {
          setTimeout(function () {
            productsSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }, 120);
        }
      }
    }

    function initWorkflowTransportUI(root) {
      if (!root) return;
      const idx = root.dataset.transportPrefix;
      root.querySelectorAll('input[type="checkbox"]').forEach(cb => syncCheckboxHidden(cb));
      if (idx !== undefined && idx !== null && idx !== '') {
        fpTransportUpdateContainerSourceUI(idx);
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('[data-transport-tool-root]').forEach(function(root) {
        const mode = root.dataset.transportMode || 'standalone';
        if (mode === 'workflow') initWorkflowTransportUI(root);
        else initStandaloneTransportUI(root);
      });
    });
    </script>
