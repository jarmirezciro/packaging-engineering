{% extends "base.html" %}
{% block content %}

<div class="container mt-4">
  <h3>Create Packaging Catalogue</h3>

  <div class="card shadow-sm mt-3">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="btn btn-success">Create</button>
        <a href="{% url 'catalogue_list' %}" class="btn btn-outline-secondary">Cancel</a>
      </form>
    </div>
  </div>
</div>

{% endblock %}
