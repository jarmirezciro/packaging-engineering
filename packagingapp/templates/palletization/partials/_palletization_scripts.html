<style>
    .tool-collapsible-head{
        display:flex;
        justify-content:space-between;
        align-items:flex-start;
        gap:12px;
        margin-top:2px;
        margin-bottom:10px;
    }

    @media (max-width: 768px){
        .tool-collapsible-head{
            flex-direction:column;
            align-items:stretch;
        }
    }
</style>

<script>
    function palletToolSuffix(prefix) {
        return prefix ? "_" + prefix : "";
    }

    function palletToolName(base, prefix) {
        return base + palletToolSuffix(prefix);
    }

    function palletToolId(base, prefix) {
        return base + palletToolSuffix(prefix);
    }

    function palletToolForm(prefix) {
        const rootId = palletToolId("palletizationToolRoot", prefix);
        const root = document.getElementById(rootId);
        if (root && root.closest("form")) return root.closest("form");
        return document.querySelector("form");
    }

    function palletToolSetHidden(baseName, prefix, value) {
        const form = palletToolForm(prefix);
        if (!form) return;
        const field = form.querySelector(`[name="${palletToolName(baseName, prefix)}"]`);
        if (field) field.value = value;

        if (baseName === "action" && prefix !== "") {
            const workflowField = form.querySelector(`[name="step_action_${prefix}"]`);
            if (workflowField) workflowField.value = value;
        }
    }

    function palletToolGetCheckedValue(baseName, prefix, fallbackValue) {
        const form = palletToolForm(prefix);
        if (!form) return fallbackValue;
        const checked = form.querySelector(`input[name="${palletToolName(baseName, prefix)}"]:checked`);
        return checked ? checked.value : fallbackValue;
    }

    function palletToolSubmitRefresh(prefix) {
        palletToolSetHidden("action", prefix, "refresh");
        const form = palletToolForm(prefix);
        if (form) form.submit();
    }

    function palletToolBrowseBoxCatalogue(prefix) {
        palletToolSetHidden("selected_box_id", prefix, "");
        palletToolSubmitRefresh(prefix);
    }

    function palletToolClearSelectedBox(prefix) {
        palletToolSetHidden("selected_box_id", prefix, "");
        palletToolSubmitRefresh(prefix);
    }

    function palletToolSelectBox(prefix, boxId) {
        palletToolSetHidden("selected_box_id", prefix, boxId);
        palletToolSubmitRefresh(prefix);
    }

    function palletToolBrowsePalletCatalogue(prefix) {
        palletToolSetHidden("pallet_id", prefix, "");
        palletToolSubmitRefresh(prefix);
    }

    function palletToolClearSelectedPallet(prefix) {
        palletToolSetHidden("pallet_id", prefix, "");
        palletToolSubmitRefresh(prefix);
    }

    function palletToolSelectPallet(prefix, palletId) {
        palletToolSetHidden("pallet_id", prefix, palletId);
        palletToolSubmitRefresh(prefix);
    }

    function palletToolToggleConstraints(prefix, forceOpen = null) {
        const section = document.getElementById(palletToolId("stackingConstraintsSection", prefix));
        const text = document.getElementById(palletToolId("toggleConstraintsText", prefix));
        const icon = document.getElementById(palletToolId("toggleConstraintsIcon", prefix));
        const hidden = document.getElementById(palletToolId("show_advanced", prefix));

        if (!section) return;

        let shouldOpen;
        if (forceOpen === true) {
            shouldOpen = true;
        } else if (forceOpen === false) {
            shouldOpen = false;
        } else {
            shouldOpen = section.style.display === "none";
        }

        section.style.display = shouldOpen ? "block" : "none";

        if (text) text.textContent = shouldOpen ? "Hide Advanced" : "Show Advanced";
        if (icon) {
            icon.className = shouldOpen
                ? "bi bi-chevron-up me-2"
                : "bi bi-chevron-down me-2";
        }
        if (hidden) {
            hidden.value = shouldOpen ? "1" : "0";
        }
    }

    function palletToolRunAnalysis(prefix) {
        palletToolSetHidden("action", prefix, "run_analysis");
        const form = palletToolForm(prefix);
        if (form) form.submit();
    }

    function palletToolSelectResult(prefix, resultKey) {
        palletToolSetHidden("selected_result_key", prefix, resultKey);
        palletToolSetHidden("action", prefix, "select_result");
        const form = palletToolForm(prefix);
        if (form) form.submit();
    }

    function palletToolUpdateUI(prefix) {
        const boxSource = palletToolGetCheckedValue("box_source", prefix, "manual");
        const palletSource = palletToolGetCheckedValue("pallet_source", prefix, "manual");

        const boxCatalogueChooser = document.getElementById(palletToolId("boxCatalogueChooser", prefix));
        const manualBoxFields = document.getElementById(palletToolId("manualBoxFields", prefix));

        const palletCatalogueChooser = document.getElementById(palletToolId("palletCatalogueChooser", prefix));
        const manualPalletFields = document.getElementById(palletToolId("manualPalletFields", prefix));
        const cataloguePalletMainFields = document.getElementById(palletToolId("cataloguePalletMainFields", prefix));

        if (boxSource === "catalogue") {
            if (boxCatalogueChooser) boxCatalogueChooser.style.display = "block";
            if (manualBoxFields) manualBoxFields.style.display = "none";
        } else {
            if (boxCatalogueChooser) boxCatalogueChooser.style.display = "none";
            if (manualBoxFields) manualBoxFields.style.display = "block";
        }

        if (palletSource === "catalogue") {
            if (palletCatalogueChooser) palletCatalogueChooser.style.display = "block";
            if (manualPalletFields) manualPalletFields.style.display = "none";
            if (cataloguePalletMainFields) cataloguePalletMainFields.style.display = "block";
        } else {
            if (palletCatalogueChooser) palletCatalogueChooser.style.display = "none";
            if (manualPalletFields) manualPalletFields.style.display = "block";
            if (cataloguePalletMainFields) cataloguePalletMainFields.style.display = "none";
        }
    }

    function palletToolInit(prefix) {
        palletToolUpdateUI(prefix);

        const showAdvancedInput = document.getElementById(palletToolId("show_advanced", prefix));
        const initialShowAdvanced = showAdvancedInput && showAdvancedInput.value === "1";
        palletToolToggleConstraints(prefix, initialShowAdvanced);

        const form = palletToolForm(prefix);
        if (!form) return;

        form.querySelectorAll(`input[name="${palletToolName("box_source", prefix)}"]`).forEach(el => {
            el.addEventListener("change", function () {
                palletToolSetHidden("selected_box_id", prefix, "");
                palletToolSubmitRefresh(prefix);
            });
        });

        form.querySelectorAll(`input[name="${palletToolName("pallet_source", prefix)}"]`).forEach(el => {
            el.addEventListener("change", function () {
                palletToolSetHidden("pallet_id", prefix, "");
                palletToolSubmitRefresh(prefix);
            });
        });

        const boxCatalogueSelect = form.querySelector(`select[name="${palletToolName("box_catalogue_id", prefix)}"]`);
        if (boxCatalogueSelect) {
            boxCatalogueSelect.addEventListener("change", function () {
                palletToolSetHidden("selected_box_id", prefix, "");
                palletToolSubmitRefresh(prefix);
            });
        }

        const palletCatalogueSelect = form.querySelector(`select[name="${palletToolName("pallet_catalogue_id", prefix)}"]`);
        if (palletCatalogueSelect) {
            palletCatalogueSelect.addEventListener("change", function () {
                palletToolSetHidden("pallet_id", prefix, "");
                palletToolSubmitRefresh(prefix);
            });
        }
    }

    document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll("[data-pallet-tool-root]").forEach(function (root) {
            const prefix = root.getAttribute("data-pallet-prefix") || "";
            palletToolInit(prefix);

            root.querySelectorAll(".tool-clickable-row").forEach(row => {
                row.addEventListener("keydown", function (e) {
                    if (e.key === "Enter" || e.key === " ") {
                        e.preventDefault();
                        row.click();
                    }
                });
            });
        });
    });
</script>
